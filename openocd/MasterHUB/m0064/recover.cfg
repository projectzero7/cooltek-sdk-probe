# Load the MasterHUB Base module config
source connect.cfg

# Transition from config to run
init

# Halt the microcontroller
halt

# Dump the current flash as a backup
dump_image /tmp/base_firmware_old.bin 0x00000000 0x10000

# Erase and flash the new firmware
flash write_image erase /tmp/base_firmware_raw.bin 0x00000000

# Verify it wrote correctly
verify_image /tmp/base_firmware_raw.bin 0x00000000

# Boot into the new firmware
reset run
